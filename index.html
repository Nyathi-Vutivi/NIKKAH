<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIKKAH AESTHETICS · Spa</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brown-dark: #3D2B1F;
            --brown-primary: #6D4F3A;
            --brown-secondary: #8B6B4A;
            --brown-light: #B8957A;
            --nude: #F5E6D3;
            --nude-light: #FDF8F4;
            --nude-warm: #FAF0E8;
            --white: #FFFFFF;
            --off-white: #FCF9F6;
            --text-dark: #2C1810;
            --text-muted: #6B5A4E;
            --shadow: 0 8px 40px rgba(61, 43, 31, 0.10);
            --shadow-hover: 0 16px 56px rgba(61, 43, 31, 0.16);
            --radius: 16px;
            --transition: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--off-white);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section-padding {
            padding: 100px 0;
        }

        .section-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--brown-secondary);
            background: var(--nude);
            padding: 6px 18px;
            border-radius: 40px;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: var(--font-serif);
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            font-weight: 600;
            line-height: 1.15;
            color: var(--brown-dark);
            margin-bottom: 20px;
        }

        .section-title span {
            color: var(--brown-secondary);
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 560px;
            line-height: 1.7;
            font-weight: 300;
        }

        .text-center {
            text-align: center;
        }

        .mx-auto {
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 0.95rem;
            padding: 14px 36px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            background: var(--brown-primary);
            color: var(--white);
            box-shadow: 0 4px 16px rgba(109, 79, 58, 0.25);
        }

        .btn:hover {
            background: var(--brown-dark);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(61, 43, 31, 0.30);
        }

        .btn-outline {
            background: transparent;
            color: var(--brown-primary);
            border: 2px solid var(--brown-primary);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: var(--brown-primary);
            color: var(--white);
            box-shadow: 0 8px 28px rgba(109, 79, 58, 0.25);
        }

        .btn-white {
            background: var(--white);
            color: var(--brown-dark);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .btn-white:hover {
            background: var(--nude);
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        /* ===== NAVIGATION ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 18px 0;
            transition: var(--transition);
            background: transparent;
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 32px rgba(0, 0, 0, 0.06);
            padding: 12px 0;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.5px;
            transition: var(--transition);
        }

        .logo span {
            color: var(--nude);
            font-weight: 400;
        }

        .navbar.scrolled .logo {
            color: var(--brown-dark);
        }

        .navbar.scrolled .logo span {
            color: var(--brown-secondary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.3px;
            transition: var(--transition);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--nude);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .navbar.scrolled .nav-links a {
            color: var(--text-dark);
        }

        .navbar.scrolled .nav-links a::after {
            background: var(--brown-secondary);
        }

        .nav-links a:hover {
            color: var(--white);
        }

        .navbar.scrolled .nav-links a:hover {
            color: var(--brown-primary);
        }

        .nav-cta {
            padding: 10px 28px;
            border-radius: 60px;
            background: var(--white);
            color: var(--brown-dark) !important;
            font-weight: 600 !important;
            transition: var(--transition);
        }

        .nav-cta:hover {
            background: var(--nude) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .navbar.scrolled .nav-cta {
            background: var(--brown-primary);
            color: var(--white) !important;
        }

        .navbar.scrolled .nav-cta:hover {
            background: var(--brown-dark) !important;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 28px;
            height: 2.5px;
            background: var(--white);
            border-radius: 4px;
            transition: var(--transition);
        }

        .navbar.scrolled .hamburger span {
            background: var(--brown-dark);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, #3D2B1F 0%, #5A3F2E 50%, #7A5C48 100%);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(245, 230, 211, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 20%, rgba(245, 230, 211, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image:
                radial-gradient(circle at 30% 40%, var(--white) 1px, transparent 1px),
                radial-gradient(circle at 70% 80%, var(--white) 1px, transparent 1px);
            background-size: 60px 60px, 80px 80px;
            pointer-events: none;
        }

        .hero .container {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            padding-top: 40px;
        }

        .hero-content {
            animation: fadeInUp 1s ease-out;
        }

        .hero-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--nude);
            background: rgba(255, 255, 255, 0.10);
            padding: 6px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 24px;
            backdrop-filter: blur(4px);
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.8rem, 6.5vw, 4.8rem);
            font-weight: 700;
            color: var(--white);
            line-height: 1.08;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .hero h1 .highlight {
            color: var(--nude);
            font-style: italic;
            font-weight: 400;
        }

        .hero p {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.75);
            max-width: 440px;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 36px;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeInScale 1s ease-out 0.2s both;
        }

        .hero-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1/1.15;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        }

        .hero-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-image-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(61, 43, 31, 0.30) 100%);
            pointer-events: none;
        }

        .hero-floating-card {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            padding: 18px 28px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 14px;
            animation: float 3s ease-in-out infinite;
        }

        .hero-floating-card i {
            font-size: 1.6rem;
            color: var(--brown-secondary);
        }

        .hero-floating-card .text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .hero-floating-card .text small {
            display: block;
            font-weight: 300;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal-left.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-right {
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal-right.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-scale {
            opacity: 0;
            transform: scale(0.92);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .reveal-scale.visible {
            opacity: 1;
            transform: scale(1);
        }

        .delay-1 {
            transition-delay: 0.1s;
        }
        .delay-2 {
            transition-delay: 0.2s;
        }
        .delay-3 {
            transition-delay: 0.3s;
        }
        .delay-4 {
            transition-delay: 0.4s;
        }

        /* ===== ABOUT ===== */
        .about {
            background: var(--white);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-image {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .about-image img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: var(--transition);
        }

        .about-image:hover img {
            transform: scale(1.02);
        }

        .about-image .badge {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            padding: 14px 22px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .about-image .badge i {
            color: var(--brown-secondary);
            margin-right: 8px;
        }

        .about-text .section-title {
            margin-bottom: 20px;
        }

        .about-text p {
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 300;
            line-height: 1.8;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 32px;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: var(--nude-light);
            border-radius: 12px;
            transition: var(--transition);
        }

        .stat-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .stat-item .number {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            color: var(--brown-primary);
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ===== SERVICES ===== */
        .services {
            background: var(--nude-light);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .service-card {
            background: var(--white);
            padding: 40px 32px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--brown-secondary), var(--brown-light));
            opacity: 0;
            transition: var(--transition);
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .service-card .icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--nude);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            color: var(--brown-primary);
            transition: var(--transition);
        }

        .service-card:hover .icon {
            background: var(--brown-primary);
            color: var(--white);
            transform: scale(1.05) rotate(-4deg);
        }

        .service-card h3 {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: var(--brown-dark);
        }

        .service-card p {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.7;
            font-weight: 300;
        }

        /* ===== GALLERY ===== */
        .gallery {
                    background: linear-gradient(180deg, transparent 50%, rgba(61,43,31,0.60) 100%);
        opacity: 0;
        transition: var(--transition);
        display: flex;
        align-items: flex-end;
        padding: 24px;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .gallery-item .overlay span {
        color: var(--white);
        font-weight: 500;
        font-size: 0.9rem;
        letter-spacing: 0.3px;
    }
    .gallery-item .overlay i { margin-right: 10px; font-size: 0.8rem; color: var(--nude); }

    /* CONTACT */
    .contact { background: var(--nude-light); }
    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        margin-top: 50px;
        align-items: start;
    }
    .contact-info {
        background: var(--white);
        padding: 48px 40px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
    }
    .contact-info h3 {
        font-family: var(--font-serif);
        font-size: 1.6rem;
        margin-bottom: 8px;
        color: var(--brown-dark);
    }
    .contact-info p {
        color: var(--text-muted);
        font-weight: 300;
        margin-bottom: 32px;
    }
    .contact-item {
        display: flex;
        align-items: flex-start;
        gap: 18px;
        margin-bottom: 24px;
    }
    .contact-item .icon-box {
        width: 48px;
        height: 48px;
        min-width: 48px;
        border-radius: 50%;
        background: var(--nude);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--brown-primary);
        font-size: 1.1rem;
        transition: var(--transition);
    }
    .contact-item:hover .icon-box {
        background: var(--brown-primary);
        color: var(--white);
    }
    .contact-item .detail h4 {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--brown-dark);
        margin-bottom: 2px;
    }
    .contact-item .detail p {
        font-size: 0.92rem;
        color: var(--text-muted);
        margin-bottom: 0;
        font-weight: 300;
    }
    .contact-item .detail a { color: var(--brown-secondary); transition: var(--transition); }
    .contact-item .detail a:hover { color: var(--brown-dark); }
    .contact-form {
        background: var(--white);
        padding: 48px 40px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
    }
    .contact-form h3 {
        font-family: var(--font-serif);
        font-size: 1.6rem;
        margin-bottom: 8px;
        color: var(--brown-dark);
    }
    .contact-form p {
        color: var(--text-muted);
        font-weight: 300;
        margin-bottom: 28px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--brown-dark);
        margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #EDE6E0;
        border-radius: 12px;
        font-family: var(--font-sans);
        font-size: 0.95rem;
        background: var(--off-white);
        transition: var(--transition);
        color: var(--text-dark);
        outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
        border-color: var(--brown-secondary);
        background: var(--white);
        box-shadow: 0 0 0 4px rgba(109,79,58,0.08);
    }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* FOOTER */
    .footer {
        background: var(--brown-dark);
        color: rgba(255,255,255,0.7);
        padding: 60px 0 30px;
    }
    .footer-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 40px;
        margin-bottom: 40px;
    }
    .footer-brand .logo {
        color: var(--white);
        font-size: 1.8rem;
        display: inline-block;
        margin-bottom: 12px;
    }
    .footer-brand .logo span { color: var(--nude); }
    .footer-brand p {
        font-weight: 300;
        font-size: 0.92rem;
        max-width: 300px;
        line-height: 1.8;
    }
    .footer h4 { color: var(--white); font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .footer ul { list-style: none; }
    .footer ul li { margin-bottom: 10px; }
    .footer ul a {
        font-weight: 300;
        font-size: 0.9rem;
        transition: var(--transition);
    }
    .footer ul a:hover { color: var(--white); padding-left: 4px; }
    .footer-social { display: flex; gap: 14px; margin-top: 16px; }
    .footer-social a {
        width: 42px;
        height: 42px;
        border-radius: 50%;

    /* RESPONSIVE */

            grid-template-columns:1fr;

        .nav-links {
            position:fixed;
            top:0;
            right:-100%;

            height:100vh;
            background:var(--white);

            padding:80px 32px 40px;
            gap:20px;
            box-shadow:-8px 0 40px rgba(0,0,0,0.06);
            transition:var(--transition);

        .nav-links.open { right:0; }

</style>
</head>

        <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ---- Navbar scroll effect ----
        const navbar = document.getElementById('navbar');
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 60) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // ---- Hamburger menu ----
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('open');
        });

        // Close menu on link click (mobile)
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('open');
            });
        });

        // ---- Scroll Reveal (Intersection Observer) ----
        const revealElements = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, {
            threshold: 0.12,
            rootMargin: '0px 0px -30px 0px'
        });

        revealElements.forEach(el => revealObserver.observe(el));

        // ---- Contact Form (simple demo) ----
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!name || !email) {
                alert('Please fill in your name and email.');
                return;
            }

            // Simple email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }

            // Success feedback
            const btn = contactForm.querySelector('.btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Sent!';
            btn.style.background = '#4A7C59';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
                btn.disabled = false;
                contactForm.reset();
                alert('Thank you for reaching out! We\'ll get back to you shortly.');
            }, 1800);
        });

        // ---- Smooth reveal on load for hero ----
        window.addEventListener('load', () => {
            document.querySelector('.hero-content').style.opacity = '1';
        });
    </script>

</body>
</html>
