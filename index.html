<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIKKAH AESTHETICS | Luxury Wedding & Event Styling</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ── ROOT: NUDE · WHITE · BROWN ── */
        :root {
            --nude: #e8d5c4;
            --nude-light: #f5ebe0;
            --nude-pale: #fcf7f2;
            --white: #ffffff;
            --warm-white: #fdf9f5;
            --brown-dark: #3d2314;
            --brown-medium: #6b4226;
            --brown-warm: #8b5e3c;
            --brown-light: #b8957a;
            --gold-nude: #d4a574;
            --rose-nude: #dbb8a0;
            --shadow: rgba(61, 35, 20, 0.12);
            --shadow-strong: rgba(61, 35, 20, 0.20);
            --text-dark: #2b1a0e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            background-color: var(--warm-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            color: var(--brown-dark);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── HEADER & NAV ── */
        header {
            background-color: rgba(253, 249, 245, 0.95);
            box-shadow: 0 2px 20px var(--shadow);
            position: fixed;
            width: 100%;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        header.scrolled {
            padding: 5px 0;
            background-color: rgba(253, 249, 245, 0.98);
            backdrop-filter: blur(10px);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            transition: padding 0.4s ease;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 34px;
            font-weight: 700;
            color: var(--brown-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--gold-nude);
            margin-left: 4px;
        }

        .logo i {
            font-size: 26px;
            margin-right: 10px;
            color: var(--brown-warm);
        }

        .nav-menu {
            display: flex;
            list-style: none;
        }

        .nav-menu li {
            margin-left: 30px;
            position: relative;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
            position: relative;
            letter-spacing: 0.3px;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background: var(--gold-nude);
            left: 0;
            bottom: -5px;
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .nav-menu a:hover {
            color: var(--brown-medium);
        }

        .mobile-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--brown-dark);
        }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(135deg,
                    rgba(61, 35, 20, 0.55) 0%,
                    rgba(107, 66, 38, 0.40) 100%),
                url('https://images.unsplash.com/photo-1519741497674-611481863552?ixlib=rb-4.0.3&auto=format&fit=crop&w=1770&q=80') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding-top: 80px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(253, 249, 245, 0.08) 0%, transparent 70%);
        }

        .hero-content {
            max-width: 800px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1.2s ease forwards 0.5s;
            z-index: 2;
            position: relative;
        }

        .hero-content .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--nude-light);
            margin-bottom: 10px;
        }

        .hero h1 {
            font-size: 4.6rem;
            margin-bottom: 20px;
            color: var(--white);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            letter-spacing: 2px;
        }

        .hero h1 span {
            color: var(--gold-nude);
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-weight: 300;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: 0.5px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--brown-warm) 0%, var(--brown-medium) 100%);
            color: var(--white);
            padding: 16px 44px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(61, 35, 20, 0.30);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-nude) 0%, var(--brown-warm) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(61, 35, 20, 0.35);
        }

        .btn:hover::before {
            opacity: 1;
        }

        /* floating rings / decor */
        .floating-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-element {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }

        .floating-element:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 15%;
            left: 5%;
            animation: float 18s ease-in-out infinite;
        }

        .floating-element:nth-child(2) {
            width: 70px;
            height: 70px;
            top: 65%;
            left: 85%;
            animation: float 14s ease-in-out infinite reverse;
            border-color: rgba(212, 165, 116, 0.20);
        }

        .floating-element:nth-child(3) {
            width: 40px;
            height: 40px;
            top: 82%;
            left: 12%;
            animation: float 12s ease-in-out infinite;
            border-color: rgba(212, 165, 116, 0.15);
        }

        .floating-element:nth-child(4) {
            width: 60px;
            height: 60px;
            top: 30%;
            right: 8%;
            animation: float 16s ease-in-out infinite 2s;
            border-color: rgba(255, 255, 255, 0.06);
        }

        /* ── SERVICES ── */
        .services {
            padding: 100px 0;
            background: linear-gradient(to bottom, var(--warm-white) 0%, var(--nude-pale) 100%);
            position: relative;
        }

        .services::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 C50,100 50,0 100,100 L100,0 Z" fill="rgba(232,213,196,0.15)"/></svg>');
            background-size: 100% 100%;
            pointer-events: none;
        }

        .section-title {
            text-align: center;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s ease forwards;
        }

        .section-title .label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--brown-light);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .section-title h2 {
            font-size: 3.2rem;
            position: relative;
            display: inline-block;
            padding-bottom: 15px;
            color: var(--brown-dark);
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            width: 70px;
            height: 3px;
            background: var(--gold-nude);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            position: relative;
            z-index: 2;
        }

        .service-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px var(--shadow);
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
            position: relative;
        }

        .service-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--nude-light) 0%, var(--nude) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .service-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 50px var(--shadow-strong);
        }

        .service-card:hover::before {
            opacity: 0.08;
        }

        .service-img {
            height: 220px;
            background-color: var(--nude);
            background-position: center;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        .service-img::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(61, 35, 20, 0.50) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .service-card:hover .service-img::after {
            opacity: 1;
        }

        .service-content {
            padding: 30px;
            position: relative;
            z-index: 2;
        }

        .service-content h3 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: var(--brown-dark);
        }

        .service-content p {
            margin-bottom: 20px;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .service-icon {
            position: absolute;
            top: -30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--brown-warm) 0%, var(--brown-medium) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 24px;
            box-shadow: 0 5px 18px rgba(61, 35, 20, 0.18);
            z-index: 3;
        }

        /* ── ABOUT ── */
        .about {
            padding: 150px 0;
            background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown-medium) 100%);
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        .about::before {
            content: '✦';
            position: absolute;
            top: -60px;
            right: 40px;
            font-size: 200px;
            color: rgba(255, 255, 255, 0.04);
            font-family: serif;
        }

        .about::after {
            content: '';
            position: absolute;
            bottom: -120px;
            left: -120px;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .about-img {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transform: translateX(-30px);
            position: relative;
        }

        .about-img::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: -20px;
            bottom: -20px;
            border: 2px solid var(--gold-nude);
            border-radius: 20px;
            z-index: -1;
            opacity: 0.35;
        }

        .about-img img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .about-img:hover img {
            transform: scale(1.04);
        }

        .about-text {
            opacity: 0;
            transform: translateX(30px);
        }

        .about-text .label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--nude);
            margin-bottom: 10px;
            font-weight: 400;
        }

        .about-text h2 {
            font-size: 3.2rem;
            margin-bottom: 25px;
            color: var(--white);
        }

        .about-text p {
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.88);
        }

        /* ── TESTIMONIALS ── */
        .testimonials {
            padding: 150px 0;
            background: var(--warm-white);
            position: relative;
        }

        .testimonials::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L100,0 L100,100 Z" fill="rgba(61,35,20,0.02)"/></svg>');
            background-size: 100% 100%;
            pointer-events: none;
        }

        .testimonial-slider {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .testimonial {
            background: var(--white);
            padding: 50px 55px;
            border-radius: 16px;
            margin: 20px;
            box-shadow: 0 10px 35px var(--shadow);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s ease;
            position: relative;
            border-left: 4px solid var(--gold-nude);
        }

        .testimonial::before {
            content: '\201C';
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 80px;
            color: var(--nude);
            font-family: 'Cormorant Garamond', serif;
            opacity: 0.3;
        }

        .testimonial p {
            font-style: italic;
            margin-bottom: 25px;
            font-size: 1.15rem;
            line-height: 1.9;
            position: relative;
            z-index: 2;
            color: var(--text-dark);
        }

        .client {
            display: flex;
            align-items: center;
        }

        .client-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            margin-right: 16px;
            border: 2px solid var(--nude);
        }

        .client-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .client-info h4 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--brown-dark);
        }

        .client-info span {
            color: var(--brown-warm);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* ── CTA ── */
        .cta {
            padding: 150px 0;
            background: linear-gradient(rgba(61, 35, 20, 0.75), rgba(61, 35, 20, 0.75)),
                url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?ixlib=rb-4.0.3&auto=format&fit=crop&w=1770&q=80') fixed no-repeat center center/cover;
            text-align: center;
            color: var(--white);
            position: relative;
        }

        .cta::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, rgba(212, 165, 116, 0.10) 0%, transparent 70%);
        }

        .cta-content {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .cta .label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--nude);
            font-weight: 400;
            margin-bottom: 10px;
        }

        .cta h2 {
            font-size: 3.6rem;
            margin-bottom: 25px;
            color: var(--white);
        }

        .cta p {
            max-width: 600px;
            margin: 0 auto 45px;
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .cta .btn {
            background: linear-gradient(135deg, var(--gold-nude) 0%, var(--brown-warm) 100%);
            box-shadow: 0 6px 25px rgba(212, 165, 116, 0.30);
        }

        .cta .btn:hover {
            box-shadow: 0 12px 35px rgba(212, 165, 116, 0.40);
        }

        /* ── FOOTER ── */
        footer {
            background: linear-gradient(to bottom, var(--brown-dark) 0%, #1f1109 100%);
            color: var(--nude-light);
            padding: 100px 0 30px;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
