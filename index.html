<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIKKAH AESTHETICS | Luxury Spa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        /* ── Reset & Base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --nude-100: #faf5f0;
            --nude-200: #f5ede8;
            --nude-300: #e8d5c4;
            --nude-400: #d4b8a8;
            --nude-500: #c4a48e;
            --brown-300: #a0847a;
            --brown-500: #7a5f53;
            --brown-700: #4d352b;
            --brown-900: #2d1f18;
            --white: #ffffff;
            --shadow-sm: 0 4px 20px rgba(45, 31, 24, 0.06);
            --shadow-md: 0 12px 40px rgba(45, 31, 24, 0.10);
            --shadow-lg: 0 24px 60px rgba(45, 31, 24, 0.14);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--nude-100);
            color: var(--brown-900);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            display: block;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--nude-200);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--nude-400);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--brown-300);
        }

        /* ── Preloader ── */
        #preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--nude-100);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #preloader.hide {
            opacity: 0;
            visibility: hidden;
        }
        .loader-ring {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid var(--nude-300);
            border-top-color: var(--brown-500);
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Navigation ── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 18px 0;
            background: transparent;
            transition: background 0.4s ease, padding 0.4s ease, box-shadow 0.4s ease;
        }
        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: var(--shadow-sm);
            padding: 12px 0;
        }
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--brown-700);
            letter-spacing: -0.02em;
            transition: color 0.3s;
        }
        .logo span {
            color: var(--brown-500);
            font-weight: 400;
        }
        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--brown-700);
            position: relative;
            transition: color 0.3s;
            letter-spacing: 0.4px;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--brown-500);
            transition: width 0.3s ease;
        }
        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }
        .nav-links a:hover {
            color: var(--brown-500);
        }
        .nav-cta {
            background: var(--brown-700);
            color: var(--white) !important;
            padding: 10px 26px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.85rem;
            transition: background 0.3s, transform 0.3s;
            letter-spacing: 0.3px;
        }
        .nav-cta::after {
            display: none !important;
        }
        .nav-cta:hover {
            background: var(--brown-900);
            transform: scale(1.03);
            color: var(--white) !important;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            background: none;
            border: none;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 2.5px;
            background: var(--brown-700);
            border-radius: 4px;
            transition: 0.3s ease;
        }
        .hamburger.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ── Hero ── */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding: 120px 0 80px;
            background: linear-gradient(165deg, var(--nude-100) 0%, var(--nude-200) 100%);
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 70%;
            height: 140%;
            background: radial-gradient(ellipse at 70% 50%, rgba(212, 184, 168, 0.20) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        .hero-content h1 {
            font-size: clamp(2.8rem, 6vw, 4.6rem);
            line-height: 1.08;
            color: var(--brown-900);
            margin-bottom: 20px;
        }
        .hero-content h1 em {
            font-style: italic;
            color: var(--brown-500);
            font-weight: 400;
        }
        .hero-content p {
            font-size: 1.15rem;
            color: var(--brown-300);
            max-width: 480px;
            margin-bottom: 32px;
            font-weight: 400;
            line-height: 1.8;
        }
        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: var(--brown-700);
            color: var(--white);
            padding: 14px 38px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 24px rgba(74, 53, 43, 0.18);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary:hover {
            background: var(--brown-900);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(74, 53, 43, 0.25);
        }
        .btn-secondary {
            background: transparent;
            color: var(--brown-700);
            padding: 14px 38px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            border: 2px solid var(--nude-400);
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-secondary:hover {
            border-color: var(--brown-500);
            background: var(--nude-200);
            transform: translateY(-2px);
        }

        .hero-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .hero-visual .ornament {
            width: 100%;
            max-width: 460px;
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, var(--nude-300), var(--nude-400));
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-lg);
            position: relative;
            animation: float 6s ease-in-out infinite;
        }
        .hero-visual .ornament-inner {
            width: 70%;
            height: 70%;
            background: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--brown-700);
            text-align: center;
            line-height: 1.3;
            padding: 20px;
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.3);
        }
        .hero-visual .ornament-inner span {
            display: block;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            color: var(--brown-300);
            margin-top: 4px;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) rotate(-2deg);
            }
            50% {
                transform: translateY(-18px) rotate(2deg);
            }
        }

        /* floating accent dots */
        .dot-accent {
            position: absolute;
            border-radius: 50%;
            background: var(--nude-400);
            opacity: 0.4;
            pointer-events: none;
        }
        .dot-accent.d1 {
            width: 20px;
            height: 20px;
            top: 10%;
            right: 8%;
        }
        .dot-accent.d2 {
            width: 12px;
            height: 12px;
            bottom: 18%;
            left: 5%;
            background: var(--brown-300);
        }
        .dot-accent.d3 {
            width: 30px;
            height: 30px;
            top: 60%;
            right: -5%;
            background: var(--nude-300);
            opacity: 0.2;
        }

        /* ── Section common ── */
        section {
            padding: 90px 0;
        }
        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--brown-300);
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
        }
        .section-title {
            font-size: clamp(2.2rem, 4vw, 3.2rem);
            line-height: 1.15;
            color: var(--brown-900);
            margin-bottom: 16px;
        }
        .section-sub {
            font-size: 1.05rem;
            color: var(--brown-300);
            max-width: 560px;
            line-height: 1.7;
        }
        .section-header {
            text-align: center;
            margin-bottom: 56px;
        }
        .section-header .section-sub {
            margin: 0 auto;
        }

        /* ── About ── */
        #about {
            background: var(--white);
        }
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        .about-image {
            background: linear-gradient(145deg, var(--nude-200), var(--nude-300));
            border-radius: var(--radius);
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--brown-700);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        .about-image::after {
            content: '✦';
            font-size: 6rem;
            opacity: 0.10;
            position: absolute;
            bottom: -10%;
            right: -5%;
            color: var(--brown-500);
        }
        .about-image .inner-text {
            text-align: center;
            padding: 40px;
            z-index: 2;
        }
        .about-image .inner-text small {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            color: var(--brown-300);
            margin-top: 8px;
        }
        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 18px;
            color: var(--brown-700);
        }
        .about-text p {
            color: var(--brown-300);
            margin-bottom: 18px;
            line-height: 1.8;
        }
        .about-stats {
            display: flex;
            gap: 40px;
            margin-top: 28px;
        }
        .about-stats .stat h4 {
            font-size: 2rem;
            color: var(--brown-700);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }
        .about-stats .stat p {
            font-size: 0.85rem;
            color: var(--brown-300);
            margin: 0;
        }

        /* ── Services ── */
        #services {
            background: var(--nude-100);
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 32px;
        }
        .service-card {
            background: var(--white);
            padding: 40px 28px 36px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            text-align: center;
            border: 1px solid rgba(212, 184, 168, 0.12);
        }
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-md);
        }
        .service-card .icon {
            font-size: 2.8rem;
            margin-bottom: 16px;
            display: inline-block;
        }
        .service-card h4 {
            font-size: 1.25rem;
            color: var(--brown-700);
            margin-bottom: 10px;
        }
        .service-card p {
            font-size: 0.95rem;
            color: var(--brown-300);
            line-height: 1.7;
        }

        /* ── Gallery ── */
        #gallery {
            background: var(--white);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .gallery-item {
            border-radius: var(--radius-sm);
            overflow: hidden;
            aspect-ratio: 1/1;
            background: var(--nude-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: var(--brown-300);
            box-shadow: var(--shadow-sm);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
            position: relative;
            font-family: 'Playfair Display', serif;
            font-weight: 400;
        }
        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-md);
        }
        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: rgba(45, 31, 24, 0.30);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            color: var(--white);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            letter-spacing: 0.5px;
            padding: 16px;
            text-align: center;
        }
        .gallery-item:hover .overlay {
            opacity: 1;
        }
        .gallery-item:nth-child(1) {
            background: linear-gradient(145deg, #e8d5c4, #d4b8a8);
        }
        .gallery-item:nth-child(2) {
            background: linear-gradient(145deg, #dcc9ba, #c9b0a0);
        }
        .gallery-item:nth-child(3) {
            background: linear-gradient(145deg, #f0e2d8, #dcc9ba);
        }
        .gallery-item:nth-child(4) {
            background: linear-gradient(145deg, #d4b8a8, #c4a48e);
        }
        .gallery-item:nth-child(5) {
            background: linear-gradient(145deg, #c9b0a0, #b89a88);
        }
        .gallery-item:nth-child(6) {
            background: linear-gradient(145deg, #e8d5c4, #dcc9ba);
        }
        .gallery-item:nth-child(7) {
            background: linear-gradient(145deg, #dcc9ba, #d4b8a8);
        }
        .gallery-item:nth-child(8) {
            background: linear-gradient(145deg, #f5ede8, #e8d5c4);
        }

        /* ── Contact ── */
        #contact {
            background: var(--nude-100);
        }
        .contact-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }
        .contact-info h3 {
            font-size: 2rem;
            color: var(--brown-700);
            margin-bottom: 16px;
        }
        .contact-info p {
            color: var(--brown-300);
            margin-bottom: 28px;
            line-height: 1.8;
        }
        .contact-detail {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }
        .contact-detail .emoji {
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }
        .contact-detail .text {
            font-size: 0.95rem;
            color: var(--brown-700);
        }
        .contact-detail .text small {
            display: block;
            font-size: 0.8rem;
            color: var(--brown-300);
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 14p
