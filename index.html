<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIKKAH AESTHETICS · Luxury Spa</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --nude-100: #faf6f2;
            --nude-200: #f5ede6;
            --nude-300: #e8d9ce;
            --nude-400: #dcc8b8;
            --brown-500: #a8846a;
            --brown-600: #8b6b4f;
            --brown-700: #6b4f3a;
            --brown-800: #4a3228;
            --brown-900: #2f1f18;
            --white: #ffffff;
            --shadow: 0 20px 60px rgba(74, 50, 40, 0.10);
            --shadow-hover: 0 30px 80px rgba(74, 50, 40, 0.18);
            --radius: 20px;
            --transition: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--nude-100);
            color: var(--brown-800);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .section-title {
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            color: var(--brown-800);
            margin-bottom: 12px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 60px;
            height: 4px;
            background: var(--brown-500);
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .section-title:hover::after {
            width: 100px;
        }

        .section-subtitle {
            font-size: 1.05rem;
            color: var(--brown-600);
            font-weight: 300;
            max-width: 560px;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .text-center {
            text-align: center;
        }

        .text-center .section-title::after {
            left: 50%;
            transform: translateX(-50%);
        }

        .text-center .section-subtitle {
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            background: var(--brown-700);
            color: var(--white);
            box-shadow: 0 8px 24px rgba(74, 50, 40, 0.15);
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 40px rgba(74, 50, 40, 0.25);
            background: var(--brown-800);
        }

        .btn-outline {
            background: transparent;
            color: var(--brown-700);
            border: 2px solid var(--brown-500);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: var(--brown-700);
            color: var(--white);
            border-color: var(--brown-700);
        }

        .btn-whatsapp {
            background: #25d366;
            color: #fff;
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.30);
        }

        .btn-whatsapp:hover {
            background: #1da851;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 40px rgba(37, 211, 102, 0.35);
        }

        /* ===== NAVIGATION ===== */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 18px 0;
            transition: var(--transition);
            background: transparent;
        }

        nav.scrolled {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
            box-shadow: 0 4px 30px rgba(74, 50, 40, 0.06);
            padding: 12px 0;
        }

        nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.5px;
            transition: var(--transition);
        }

        nav.scrolled .logo {
            color: var(--brown-800);
        }

        .logo span {
            font-weight: 300;
            color: var(--nude-300);
        }

        nav.scrolled .logo span {
            color: var(--brown-500);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: var(--transition);
            position: relative;
        }

        nav.scrolled .nav-links a {
            color: var(--brown-700);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--brown-500);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--white);
        }

        nav.scrolled .nav-links a:hover {
            color: var(--brown-800);
        }

        .nav-cta {
            background: var(--white);
            color: var(--brown-700) !important;
            padding: 8px 22px;
            border-radius: 50px;
            font-weight: 500 !important;
            transition: var(--transition);
        }

        .nav-cta:hover {
            background: var(--brown-700) !important;
            color: var(--white) !important;
            transform: scale(1.04);
        }

        nav.scrolled .nav-cta {
            background: var(--brown-700);
            color: var(--white) !important;
        }

        nav.scrolled .nav-cta:hover {
            background: var(--brown-800) !important;
        }

        /* Mobile menu */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
        }

        .hamburger span {
            width: 28px;
            height: 2.5px;
            background: var(--white);
            border-radius: 4px;
            transition: var(--transition);
        }

        nav.scrolled .hamburger span {
            background: var(--brown-800);
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, #2f1f18 0%, #4a3228 40%, #6b4f3a 80%);
            overflow: hidden;
            padding: 120px 0 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(168, 132, 106, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(220, 200, 184, 0.08) 0%, transparent 50%);
            z-index: 1;
        }

        /* Decorative circles */
        .hero-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(220, 200, 184, 0.10);
            z-index: 1;
            pointer-events: none;
        }

        .hero-circle-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -100px;
            border-width: 2px;
        }

        .hero-circle-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -50px;
            border-color: rgba(220, 200, 184, 0.06);
        }

        .hero-circle-3 {
            width: 200px;
            height: 200px;
            top: 30%;
            right: 20%;
            border-color: rgba(220, 200, 184, 0.05);
        }

        .hero .container {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-content {
            color: var(--white);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(6px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--nude-300);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease forwards;
        }

        .hero-badge i {
            font-size: 0.7rem;
            color: var(--nude-400);
        }

        .hero h1 {
            font-size: clamp(3rem, 7vw, 5.2rem);
            font-weight: 700;
            line-height: 1.05;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease 0.1s forwards;
            opacity: 0;
        }

        .hero h1 .highlight {
            color: var(--nude-300);
            font-weight: 400;
            font-style: italic;
        }

        .hero p {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.75);
            max-width: 480px;
            margin-bottom: 36px;
            font-weight: 300;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease 0.2s forwards;
            opacity: 0;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeInUp 0.8s ease 0.3s forwards;
            opacity: 0;
        }

        .hero-buttons .btn-outline {
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--white);
        }

        .hero-buttons .btn-outline:hover {
            background: var(--white);
            color: var(--brown-800);
            border-color: var(--white);
        }

        /* Hero image */
        .hero-image {
            position: relative;
            animation: fadeInScale 1s ease 0.4s forwards;
            opacity: 0;
        }

        .hero-image-wrapper {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            aspect-ratio: 4/5;
            background: var(--brown-600);
        }

        .hero-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .hero-image-wrapper:hover img {
            transform: scale(1.03);
        }

        .hero-floating-card {
            position: absolute;
            bottom: -20px;
            left: -20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            padding: 18px 28px;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 14px;
            animation: float 4s ease-in-out infinite;
        }

        .hero-floating-card i {
            font-size: 1.8rem;
            color: var(--brown-500);
        }

        .hero-floating-card .text {
            font-size: 0.85rem;
            color: var(--brown-700);
        }

        .hero-floating-card .text strong {
            display: block;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            color: var(--brown-800);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        /* ===== SECTION COMMON ===== */
        section {
            padding: 100px 0;
        }

        section:nth-child(even) {
            background: var(--white);
        }

        /* ===== ABOUT ===== */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            margin-top: 40px;
        }

        .about-image {
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            aspect-ratio: 4/3;
            background: var(--nude-300);
            position: relative;
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .about-image:hover img {
            transform: scale(1.04);
        }

        .about-text h3 {
            font-size: 2rem;
            margin-bottom: 16px;
            color: var(--brown-800);
        }

        .about-text p {
            color: var(--brown-600);
            margin-bottom: 16px;
            font-weight: 300;
            line-height: 1.8;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 32px;
        }

        .stat-item {
            text-align: center;
            padding: 20px 12px;
            background: var(--nude-200);
            border-radius: 16px;
            transition: var(--transition);
        }

        .stat-item:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }

        .stat-item .number {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--brown-700);
        }

        .stat-item .label {
            font-size: 0.85rem;
            color: var(--brown-500);
            font-weight: 400;
        }

        /* ===== SERVICES ===== */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .service-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(220, 200, 184, 0.15);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--brown-500), var(--nude-400));
            transform: scaleX(0);
            transform-origin: left;
            transition: var(--transition);
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-hover);
        }

        .service-card .icon {
            font-size: 2.8rem;
            color: var(--brown-500);
            margin-bottom: 18px;
            display: inline-block;
            background: var(--nude-200);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            transition: var(--transition);
        }

        .service-card:hover .icon {
            background: var(--brown-700);
            color: var(--white);
            transform: rotate(-6deg) scale(1.05);
        }

        .service-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: var(--brown-800);
        }

        .service-card p {
            color: var(--brown-600);
            font-weight: 300;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* ===== GALLERY ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-top: 50px;
        }

        .gallery-item {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 1/1;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-hover);
            z-index: 2;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(47, 31, 24, 0.7), transparent 60%);
            display: flex;
            align-items: flex-end;
            padding: 24px;
            opacity: 0;
            transition: var(--transition);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay span {
            color: var(--white);
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }

        /* ===== TESTIMONIALS ===== */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .testimonial-card {
            background: var(--white);
            padding:
